<div class="min-h-screen pt-24 pb-20">
  <div class="container mx-auto px-6">
    <div class="text-center mb-16">
      <h1 class="text-5xl md:text-6xl font-black tracking-wider mb-6 text-white">DÍAS DE REUNIÓN</h1>
      <p class="text-xl md:text-2xl text-gray-300 max-w-3xl mx-auto">
        Únete a nosotros en nuestros próximos encuentros y reuniones.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let event of events" class="bg-gray-900 rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition-shadow duration-300">
        <div class="h-48 bg-gradient-to-br from-blue-600 to-blue-800"></div>
        <div class="p-6">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-semibold text-blue-400 uppercase">{{ event.category }}</span>
            <span class="text-sm text-gray-300">{{ event.date }}</span>
          </div>
          <h3 class="text-2xl font-bold text-white mb-2">{{ event.title }}</h3>
          <p class="text-gray-300 mb-4">{{ event.time }}</p>
          <p class="text-gray-300 mb-4">{{ event.description }}</p>
          <p class="text-sm text-gray-300">
            <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            {{ event.location }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
