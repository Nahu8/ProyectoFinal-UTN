<section class="min-h-screen flex items-center justify-center bg-black px-4">
  <div class="w-full max-w-md">
    <div class="bg-gray-900 rounded-lg shadow-2xl p-8 border border-gray-800">
      <h1 class="text-3xl font-bold text-center text-white mb-2">ÉL VIVE IGLESIA</h1>
      <p class="text-center text-gray-400 mb-8">Portal de Administración</p>

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Usuario</label>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
            placeholder="admin o editor"
            [disabled]="isLoading"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
            placeholder="••••••••"
            [disabled]="isLoading"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-2 rounded-lg hover:from-indigo-700 hover:to-purple-700 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Iniciando sesión...' : 'Ingresar' }}
        </button>

        <div *ngIf="errorMessage" class="bg-red-900 border border-red-700 text-red-200 px-4 py-3 rounded-lg text-sm">
          {{ errorMessage }}
        </div>
      </form>

      <div class="mt-8 p-4 bg-gray-800 rounded-lg border border-gray-700">
        <p class="text-gray-300 text-sm font-medium mb-2">Credenciales de prueba:</p>
        <ul class="text-gray-400 text-xs space-y-1">
          <li><span class="text-indigo-400">admin</span> / <span class="text-indigo-400">admin123</span></li>
          <li><span class="text-indigo-400">editor</span> / <span class="text-indigo-400">editor123</span></li>
        </ul>
      </div>
    </div>
  </div>
</section>
