<div class="relative h-screen overflow-hidden">
  <!-- Video de fondo -->
  <video #videoElement class="absolute inset-0 w-full h-full object-cover" autoplay preload="auto" loop muted playsinline
    (loadedmetadata)="onVideoLoaded()" (canplay)="onVideoLoaded()" (error)="onVideoError()" (click)="playVideo()">
    <source [src]="videoSrc" type="video/mp4">
    Tu navegador no soporta videos HTML5.
  </video>

  <!-- Overlay oscuro para mejor legibilidad del texto -->
  <div class="absolute inset-0 bg-black/40"></div>

  <!-- Fallback play button (visible si autoplay falla) -->
  <div *ngIf="showPlayButton" class="absolute inset-0 flex items-center justify-center z-20">
    <button (click)="playVideo()"
      class="bg-white/90 text-blue-900 font-bold px-6 py-3 rounded-md shadow-lg hover:scale-105 transition-transform">
      Reproducir video
    </button>
  </div>

  <!-- Contenido -->
  <div class="absolute inset-0 flex items-center justify-center z-10">
    <div class="text-center text-white max-w-4xl px-6 transform -translate-y-0 md:-translate-y-12">
      <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold mb-6 leading-tight -translate-y-0">
          ÉL VIVE IGLESIA
      </h1>
<!--       <p class="text-lg md:text-xl leading-relaxed mb-8 text-gray-200">
        Una comunidad de fe, esperanza y amor. Únete a nosotros en nuestro viaje espiritual
        mientras buscamos crecer juntos en la palabra de Dios.
      </p> -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a routerLink="/meeting-days"
          class="px-8 py-3 bg-white text-blue-900 font-bold rounded-md transition-all duration-300 hover:bg-gray-100 cursor-pointer">
          VER EVENTOS
        </a>
        <a routerLink="/contact"
          class="px-8 py-3 border-2 border-white bg-transparent text-white font-bold rounded-md transition-all duration-300 hover:bg-white hover:text-blue-900 cursor-pointer">
          CONTACTO
        </a>
      </div>
    </div>
  </div>
  <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-black to-transparent z-10"></div>
</div>
